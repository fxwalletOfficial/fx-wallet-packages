name: bc_ur_dart_example
description: Demo app for bc_ur_dart — debug & development tool. Mock data only, no real on-chain transactions.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: "^3.3.4"

dependencies:
  flutter:
    sdk: flutter

  # 本地 path 依赖
  # example/ 放在 packages/bc_ur_dart/ 内部时用 ../
  bc_ur_dart:
    path: ../../packages/bc_ur_dart

  # QR 码生成
  qr_flutter: ^4.1.0

  # QR 码扫描
  mobile_scanner: ^5.1.0

  # 路由
  go_router: ^13.0.0

  # 状态管理
  provider: ^6.1.2

  # 十六进制编解码（bc_ur_dart 已依赖 convert，这里复用）
  convert: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
