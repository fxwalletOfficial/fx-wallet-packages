name: aleo_dart
description: Dart SDK for the Aleo blockchain. Account / record / transaction support via FFI bindings to the aleo_rust native library.
version: 1.0.0
homepage: https://github.com/fxwalletOfficial/fx-wallet-packages/tree/main/packages/aleo_dart

environment:
  sdk: ^3.3.4

dependencies:
  bip39: ^1.0.6
  crypto: ^3.0.0
  ffi: ^2.1.4
  path: ^1.8.0

dev_dependencies:
  convert: ^3.1.2
  dio: ^5.4.1
  lints: ^3.0.0
  test: ^1.24.0
  web_socket_channel: ^2.4.0
