name: CI

# Monorepo-wide Dart/Flutter CI: melos bootstrap + analyze/format/test across all
# packages. Path-filtered with `paths-ignore` so changes that can't affect the Dart
# build — the Rust crate (covered by rust.yml) plus docs/license — don't trigger a
# full melos run. `paths-ignore` (rather than an allow-list) fails toward running
# CI, so a newly-added Dart path is never silently skipped.
on:
  push:
    branches: [ main, 'epic/**' ]
    paths-ignore:
      - 'rust/**'
      - '**.md'
      - 'LICENSE'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [ main, 'epic/**' ]
    paths-ignore:
      - 'rust/**'
      - '**.md'
      - 'LICENSE'
      - '.github/workflows/rust.yml'

# Cancel a superseded in-progress run on the same ref (e.g. rapid pushes to a PR)
# so only the latest commit keeps a runner.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: '3.8.0'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.0'

    - name: Install Melos
      run: dart pub global activate melos

    - name: Bootstrap
      run: melos bootstrap

    - name: Analyze
      run: melos run analyze

    - name: Format
      run: melos run format

    # crypto_wallet_util's Siacoin (sc) support runs a WASM module via the
    # `wasm_run` package, which needs a prebuilt native binary at test time.
    - name: Setup wasm_run native library (crypto_wallet_util)
      run: dart run wasm_run:setup
      working-directory: packages/crypto_wallet_util

    - name: Test
      run: melos run test
