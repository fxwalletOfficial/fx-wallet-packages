name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    # Flutter first, then Dart: setup-dart runs last so its standalone SDK wins
    # on PATH. melos `dart analyze` then uses Dart 3.11.4 (matching local dev),
    # rather than the newer/stricter Dart bundled with Flutter stable, which
    # promotes some pre-existing lints in vendored forks to fatal warnings.
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.0'

    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: '3.11.4'

    - name: Install Melos
      run: dart pub global activate melos

    - name: Bootstrap
      run: melos bootstrap

    - name: Analyze
      run: melos run analyze

    - name: Format
      run: melos run format

    - name: Test
      run: melos run test
