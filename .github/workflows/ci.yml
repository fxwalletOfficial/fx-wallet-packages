name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    # Flutter 3.41.7 bundles Dart 3.11.x, which `flutter test` needs to run
    # crypto_wallet_util (it depends on wasd, Dart >=3.11). setup-dart runs last
    # so its standalone 3.11.4 wins on PATH for `dart analyze`, matching local
    # dev rather than a newer/stricter analyzer that flags pre-existing lints in
    # the vendored forks as fatal warnings.
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.7'

    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: '3.11.4'

    - name: Install Melos
      run: dart pub global activate melos

    - name: Bootstrap
      run: melos bootstrap

    - name: Analyze
      run: melos run analyze

    - name: Format
      run: melos run format

    - name: Test
      run: melos run test
