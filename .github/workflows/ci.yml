name: CI

# Monorepo-wide Dart/Flutter CI: melos bootstrap + analyze/format/test across all
# packages. Path-filtered with `paths-ignore` so changes that can't affect the Dart
# build — the Rust crate (covered by rust.yml) plus docs/license — don't trigger a
# full melos run. `paths-ignore` (rather than an allow-list) fails toward running
# CI, so a newly-added Dart path is never silently skipped.
on:
  push:
    branches: [ main, 'epic/**' ]
    paths-ignore:
      - 'rust/**'
      - '**.md'
      - 'LICENSE'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [ main, 'epic/**' ]
    paths-ignore:
      - 'rust/**'
      - '**.md'
      - 'LICENSE'
      - '.github/workflows/rust.yml'

# Cancel a superseded in-progress run on the same ref (e.g. rapid pushes to a PR)
# so only the latest commit keeps a runner.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    # Flutter 3.41.7 bundles Dart 3.11.x, which `flutter test` needs to run
    # crypto_wallet_util (it depends on wasd, Dart >=3.11). setup-dart runs last
    # so its standalone 3.11.4 wins on PATH for `dart analyze`, matching local
    # dev rather than a newer/stricter analyzer that flags pre-existing lints in
    # the vendored forks as fatal warnings.
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.7'

    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: '3.11.4'

    - name: Install Melos
      run: dart pub global activate melos

    - name: Bootstrap
      run: melos bootstrap

    - name: Analyze
      run: melos run analyze

    - name: Format
      run: melos run format

    - name: Test
      run: melos run test
