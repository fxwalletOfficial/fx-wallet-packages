name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: '3.3.4'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.0'

    - name: Install Melos
      run: dart pub global activate melos

    - name: Bootstrap
      run: melos bootstrap

    - name: Analyze
      run: melos run analyze

    - name: Format
      run: melos run format

    # crypto_wallet_util's Siacoin (sc) support runs a WASM module via the
    # `wasm_run` package, which needs a prebuilt native binary at test time.
    - name: Setup wasm_run native library (crypto_wallet_util)
      run: dart run wasm_run:setup
      working-directory: packages/crypto_wallet_util

    - name: Test
      run: melos run test
